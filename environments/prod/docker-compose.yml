version: '3.8'

services:
  backend:
    image: 10.0.2.16:5000/senditcycles-api:latest
    container_name: senditcycles-api-prod
    environment:
      NODE_ENV: production
      USE_SQLITE: "true"
      SQLITE_PATH: /data/senditcycles.db
      PORT: "3001"
      JWT_SECRET: ${JWT_SECRET}
      LOG_LEVEL: warn
    expose:
      - "3001"
    volumes:
      - sqlite_data_prod:/data
    restart: always
    networks:
      - senditcycles-prod

  frontend:
    image: 10.0.2.16:5000/senditcycles-web:latest
    container_name: senditcycles-web-prod
    environment:
      VITE_API_URL: https://api.senditcycles.com/api
      NODE_ENV: production
    expose:
      - "80"
    volumes:
      - ./config/frontend-nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    restart: always
    networks:
      - senditcycles-prod

  # Load balancer (Nginx reverse proxy)
  # Production setup: change nginx.conf to add more backend upstream servers
  # Example: Add backend-2, backend-3, etc. to upstream block
  load-balancer:
    image: nginx:alpine
    container_name: senditcycles-lb-prod
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./config/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      # Uncomment for HTTPS (provide your certificates)
      # - ./certs:/etc/nginx/certs:ro
    depends_on:
      - backend
      - frontend
    restart: always
    networks:
      - senditcycles-prod
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  sqlite_data_prod:
    driver: local

networks:
  senditcycles-prod:
    driver: bridge
