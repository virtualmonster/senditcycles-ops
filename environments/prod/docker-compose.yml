version: '3.8'

services:
  postgres:
    image: postgres:14-alpine
    container_name: senditcycles-db-prod
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-senditcycles_prod}
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
      - ./config/init.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ./config/postgres-backup.sh:/usr/local/bin/postgres-backup.sh:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: always
    networks:
      - senditcycles-prod

  backend:
    image: 10.0.2.16:5000/senditcycles-api:latest
    container_name: senditcycles-api-prod
    environment:
      NODE_ENV: production
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME:-senditcycles_prod}
      JWT_SECRET: ${JWT_SECRET}
      LOG_LEVEL: warn
    expose:
      - "3001"
    depends_on:
      postgres:
        condition: service_healthy
    restart: always
    networks:
      - senditcycles-prod

  frontend:
    image: 10.0.2.16:5000/senditcycles-web:latest
    container_name: senditcycles-web-prod
    environment:
      VITE_API_URL: https://api.senditcycles.com/api
      NODE_ENV: production
    expose:
      - "3000"
    depends_on:
      - backend
    restart: always
    networks:
      - senditcycles-prod

  # Load balancer (Nginx reverse proxy)
  # Production setup: change nginx.conf to add more backend upstream servers
  # Example: Add backend-2, backend-3, etc. to upstream block
  load-balancer:
    image: nginx:alpine
    container_name: senditcycles-lb-prod
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./config/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      # Uncomment for HTTPS (provide your certificates)
      # - ./certs:/etc/nginx/certs:ro
    depends_on:
      - backend
      - frontend
    restart: always
    networks:
      - senditcycles-prod
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data_prod:
    driver: local

networks:
  senditcycles-prod:
    driver: bridge
