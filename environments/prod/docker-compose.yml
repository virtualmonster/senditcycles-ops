version: '3.8'

services:
  postgres:
    image: postgres:14-alpine
    container_name: senditcycles-db-prod
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-senditcycles_prod}
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
      - ../../../senditcycles/server/database/init.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ./config/postgres-backup.sh:/usr/local/bin/postgres-backup.sh:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: always
    networks:
      - senditcycles-prod

  backend:
    build:
      context: ../../../senditcycles/server
      dockerfile: Dockerfile
    container_name: senditcycles-api-prod
    environment:
      NODE_ENV: production
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME:-senditcycles_prod}
      JWT_SECRET: ${JWT_SECRET}
      LOG_LEVEL: warn
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
    restart: always
    networks:
      - senditcycles-prod

  frontend:
    build:
      context: ../../../senditcycles/client
      dockerfile: Dockerfile
    container_name: senditcycles-web-prod
    environment:
      VITE_API_URL: https://api.senditcycles.com
      NODE_ENV: production
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
    restart: always
    networks:
      - senditcycles-prod

volumes:
  postgres_data_prod:
    driver: local

networks:
  senditcycles-prod:
    driver: bridge
