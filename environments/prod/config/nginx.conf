upstream backend {
    least_conn;
    server backend:3001;
    # Additional backends added during scaling:
    # server backend-2:3001;
    # server backend-3:3001;
}

server {
    listen 80;
    listen 443 ssl http2;
    server_name senditcycles.com;

    # SSL Configuration (use your own certificates in production)
    # ssl_certificate /etc/nginx/certs/senditcycles.crt;
    # ssl_certificate_key /etc/nginx/certs/senditcycles.key;

    client_max_body_size 10M;

    # Redirect HTTP to HTTPS
    if ($scheme != "https") {
        return 301 https://$server_name$request_uri;
    }

    # Frontend - serve static assets
    location / {
        proxy_pass http://frontend:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # API - load balanced across backend instances
    location /api/ {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Keep connections alive
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Health check endpoint
    location /health {
        access_log off;
        return 200 "OK";
        add_header Content-Type text/plain;
    }
}
