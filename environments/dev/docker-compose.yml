version: '3.8'

services:
  postgres:
    image: postgres:14-alpine
    container_name: senditcycles-db-dev
    environment:
      POSTGRES_USER: ${DB_USER:-senditcycles}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-devpassword123}
      POSTGRES_DB: ${DB_NAME:-senditcycles_dev}
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
      - ./config/init.sql:/docker-entrypoint-initdb.d/01-init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-senditcycles}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - senditcycles-dev

  backend:
    image: 10.0.2.16:5000/senditcycles-api:latest
    container_name: senditcycles-api-dev
    environment:
      NODE_ENV: development
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-senditcycles}
      DB_PASSWORD: ${DB_PASSWORD:-devpassword123}
      DB_NAME: ${DB_NAME:-senditcycles_dev}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-key-change-in-prod}
      LOG_LEVEL: debug
    expose:
      - "3001"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - senditcycles-dev

  frontend:
    image: 10.0.2.16:5000/senditcycles-web:latest
    container_name: senditcycles-web-dev
    environment:
      VITE_API_URL: http://localhost/api
      NODE_ENV: development
    expose:
      - "3000"
    depends_on:
      - backend
    networks:
      - senditcycles-dev

  # Load balancer (Nginx reverse proxy)
  # Can be scaled by adjusting upstream backend servers in config/nginx.conf
  load-balancer:
    image: nginx:alpine
    container_name: senditcycles-lb-dev
    ports:
      - "3000:80"  # Frontend through LB
      - "3001:80"  # Backend API through LB
    volumes:
      - ./config/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend
    networks:
      - senditcycles-dev
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  postgres_data_dev:
    driver: local

networks:
  senditcycles-dev:
    driver: bridge
