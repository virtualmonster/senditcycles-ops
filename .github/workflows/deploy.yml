name: GitOps Deployment Pipeline

on:
  push:
    branches:
      - main
    paths:
      - 'environments/**'
      - '.github/workflows/deploy.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'environments/**'

jobs:
  validate:
    name: Validate Infrastructure Config
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      
      - name: Validate docker-compose files
        run: |
          echo "Validating dev environment..."
          docker-compose -f environments/dev/docker-compose.yml config > /dev/null
          echo "✓ dev validated"
          
          echo "Validating staging environment..."
          docker-compose -f environments/staging/docker-compose.yml config > /dev/null
          echo "✓ staging validated"
          
          echo "Validating prod environment..."
          docker-compose -f environments/prod/docker-compose.yml config > /dev/null
          echo "✓ prod validated"
      
      - name: Validate environment files
        run: |
          if [ ! -f "environments/dev/.env.dev" ]; then
            echo "ERROR: Missing environments/dev/.env.dev"
            exit 1
          fi
          echo "✓ All environment files present"

  deploy-dev:
    name: Deploy to Development
    needs: validate
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      
      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
        continue-on-error: true  # Demo mode - continue if no Docker Hub creds
      
      - name: Deploy to development
        run: |
          echo "🚀 Deploying SendItCycles to DEV environment..."
          chmod +x scripts/deploy.sh
          ./scripts/deploy.sh dev deploy
        env:
          ENVIRONMENT: dev

  deploy-staging:
    name: Deploy to Staging
    needs: [validate, deploy-dev]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      
      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
        continue-on-error: true
      
      - name: Deploy to staging
        run: |
          echo "🚀 Deploying SendItCycles to STAGING environment..."
          chmod +x scripts/deploy.sh
          ./scripts/deploy.sh staging deploy
        env:
          ENVIRONMENT: staging
          DB_PASSWORD_STAGING: ${{ secrets.STAGING_DB_PASSWORD }}
          JWT_SECRET_STAGING: ${{ secrets.STAGING_JWT_SECRET }}

  deploy-prod:
    name: Deploy to Production
    needs: [validate, deploy-staging]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    environment:
      name: production
      url: https://senditcycles.com
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Create deployment
        uses: actions/github-script@v6
        with:
          script: |
            const deployment = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.ref,
              environment: 'production',
              auto_merge: false,
              required_contexts: []
            });
            return deployment.data.id;
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      
      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
        continue-on-error: true
      
      - name: Deploy to production
        run: |
          echo "🚀 PRODUCTION DEPLOYMENT - Deploying SendItCycles to PROD environment..."
          echo "Commit: ${{ github.sha }}"
          echo "Author: ${{ github.actor }}"
          echo "Message: ${{ github.event.head_commit.message }}"
          chmod +x scripts/deploy.sh
          ./scripts/deploy.sh prod deploy
        env:
          ENVIRONMENT: prod
          DB_PASSWORD_PROD: ${{ secrets.PROD_DB_PASSWORD }}
          JWT_SECRET_PROD: ${{ secrets.PROD_JWT_SECRET }}
      
      - name: Create deployment status
        if: success()
        uses: actions/github-script@v6
        with:
          script: |
            github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: ${{ steps.deploy.outputs.deployment_id }},
              state: 'success',
              description: 'Production deployment successful',
              environment_url: 'https://senditcycles.com'
            });
      
      - name: Notify Slack on success
        if: success()
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          text: '✅ SendItCycles PRODUCTION deployment successful'
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
          fields: repo,message,commit,author
        continue-on-error: true

  audit-log:
    name: Log Deployment to Audit
    runs-on: ubuntu-latest
    if: always()
    needs: [validate, deploy-dev, deploy-staging, deploy-prod]
    
    steps:
      - name: Record deployment event
        run: |
          echo "📋 DEPLOYMENT AUDIT LOG"
          echo "======================="
          echo "Timestamp: $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          echo "Repository: ${{ github.repository }}"
          echo "Branch: ${{ github.ref }}"
          echo "Commit: ${{ github.sha }}"
          echo "Actor: ${{ github.actor }}"
          echo "Workflow: ${{ github.workflow }}"
          echo "Status: ${{ job.status }}"
          echo ""
          echo "This deployment event has been recorded for compliance and audit purposes."
